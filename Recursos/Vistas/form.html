<!DOCTYPE html>
<html lang="es">

<script>
if (!localStorage.getItem("session")) {
    window.location.href = "login.html";
}
</script>

<head>
<meta charset="UTF-8">
<title>Nuevo Registro</title>
<link rel="stylesheet" href="../Estilos/styles.css">
</head>

<body>

<div class="sidebar">
    <div>
        <!-- ✅ CORREGIDO -->
        <img class="logo" src="../Img/logo.png" alt="">
    </div>

    <div class="menu">
        <a href="dashboard.html">INICIO</a>
        <a href="index.html">REGISTROS</a>
        <a href="login.html" onclick="logout()">CERRAR SESIÓN</a>
    </div>
</div>

<div class="main">
    <div class="card">

        <div class="header">
            <h2>Nuevo Registro</h2>
        </div>

        <form id="form" class="form-grid"></form>

        <br>
        <button type="button" class="btn-success" onclick="guardar()">GUARDAR</button>

    </div>
</div>

<!-- ✅ CONFIG -->
<script src="../Drivers/config.js"></script>

<!-- ✅ FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";

import {
    getDatabase,
    ref,
    push
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {

    apiKey: "AIzaSyBDGiW7dmnu0TKgLkJa04zKoH0dyxV60NM",

    authDomain: "inventarios-5d199.firebaseapp.com",

    databaseURL: "https://inventarios-5d199-default-rtdb.firebaseio.com",

    projectId: "inventarios-5d199",

    storageBucket: "inventarios-5d199.firebasestorage.app",

    messagingSenderId: "140181884259",

    appId: "1:140181884259:web:8e4ae4eecb760657779756",

    measurementId: "G-X3860ML69E"
};

// 🔥 INICIALIZAR FIREBASE
const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

// ✅ FORM
const form = document.getElementById("form");

// ✅ VERIFICAR CONFIG
if (!config || !config.campos || !config.tipo) {

    console.error("CONFIG MAL DEFINIDA");

    alert("Error en config.js");

}

// 🧱 CREAR INPUTS DINÁMICOS
config.campos.forEach(campo => {

    let div = document.createElement("div");

    let label = document.createElement("label");

    label.innerText = campo.label;

    let input = document.createElement("input");

    input.name = campo.name;

    input.placeholder = campo.label;

    div.appendChild(label);

    div.appendChild(input);

    form.appendChild(div);

});

// ✅ GUARDAR EN FIREBASE
window.guardar = async function () {

    let nuevo = {};

    let valido = true;

    config.campos.forEach(campo => {

        let input = document.querySelector(
            `[name="${campo.name}"]`
        );

        let valor = input.value.trim();

        // ✅ VALIDACIÓN
        if (!valor) {

            input.style.border = "1px solid red";

            valido = false;

        } else {

            input.style.border = "";

        }

        nuevo[campo.name] = valor;

    });

    // ❌ CAMPOS VACÍOS
    if (!valido) {

        alert("Completa todos los campos");

        return;

    }

    try {

        console.log("TIPO:", config.tipo);

        console.log("DATOS:", nuevo);

        // 🔥 INSERTAR EN FIREBASE
        await push(
            ref(db, config.tipo),
            nuevo
        );

        alert("Registro guardado correctamente");

        // ✅ LIMPIAR FORM
        form.reset();

        // ✅ REDIRECCIÓN
        window.location.href = "index.html";

    } catch (error) {

        console.error("ERROR FIREBASE:", error);

        alert("Error al guardar en Firebase");

    }

};

// 🔐 LOGOUT
window.logout = function () {

    localStorage.removeItem("session");

    window.location.href = "login.html";

};

</script>

</body>
</html>
